<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Built, Not Born</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A1128;
    color: #fff;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .inner { max-width: 520px; }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #E8622A;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5rem);
    line-height: 1;
    margin-bottom: 1.25rem;
  }
  p {
    font-size: 17px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  a {
    display: inline-block;
    background: #E8622A;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 6px;
  }
  a:hover { background: #cf5522; }
</style>
</head>
<body>
  <div class="inner">
    <div class="eyebrow">Message Received</div>
    <h1>You're On<br>The List.</h1>
    <p>Thanks for reaching out. Robert will be in touch within 1–2 business days to talk through your event and next steps.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
